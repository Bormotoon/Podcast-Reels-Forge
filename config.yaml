# Podcast Reels Forge Configuration
#
# Default workflow:
# - Python 3.10+
# - Local Ollama only for the main analysis path
# - Gemma-only role lineup
# - FFmpeg + pycaps for rendering

paths:
  input_dir: "input"
  output_dir: "output"

cli:
  quiet: false
  verbose: false

cache:
  enabled: true
  validate_json: true

transcription:
  # Quality-first default for stronger local GPUs.
  model: "large-v3"
  device: "auto"          # auto | cuda | cpu
  language: "auto"        # auto | ru | en
  beam_size: 6
  compute_type: "auto"    # auto | float32 | float16 | int8 | int8_float16 | int8_float32

ollama:
  url: "http://127.0.0.1:11434/api/generate"
  roles:
    scout: "gemma4:e4b"
    cleanup: "gemma3:4b"
    refine: "gemma3:12b"
    judge: "gemma4:26b"
    metadata: "gemma4:26b"
  timeout: 420
  temperature: 0.2
  chunk_seconds: 900
  max_chars_chunk: 12000
  watchdog:
    enabled: true
    first_token_timeout: 60
    stall_timeout: 90
    log_interval: 10
    max_retries: 1
  fallback_models: []

  # Role-specific overrides. Keep the default flow local, predictable, and fast.
  role_overrides:
    scout:
      timeout: 360
      chunk_seconds: 1200
      temperature: 0.35
    cleanup:
      timeout: 240
      temperature: 0.12
    refine:
      timeout: 360
      temperature: 0.15
    judge:
      timeout: 420
      temperature: 0.05
    metadata:
      timeout: 240
      temperature: 0.10

  # Legacy compatibility only. Prefer role_overrides above.
  model_overrides: {}

prompts:
  language: "auto"        # auto | ru | en
  variant: "default"      # default | a | b

processing:
  quality_filters:
    min_score: 7
    min_duration: 15
    max_duration: 180
    face_min_ratio: 0.3

  clips:
    stories:
      count: 2
      max_duration: 15
    reels:
      count: 3
      max_duration: 60
    long_reels:
      count: 1
      max_duration: 180
    highlights:
      count: 1
      moments_count: 5

  reels_count: 3
  reel_min_duration: 30
  reel_max_duration: 60
  reel_padding: 5

exports:
  webm: false
  gif: false
  audio_only: false

subtitles:
  enabled: true
  font: "assets/fonts/bignoodletoooblique.ttf"
  css: "assets/subtitles/forge_subtitles.css"
  font_size_px: 46
  wrap_words: true
  max_lines: 2
  max_width_ratio: 0.92
  vertical_align: "bottom"
  vertical_offset: 0.0

video:
  threads: 4
  vertical_crop: true
  smart_crop_face: true
  video_bitrate: "6M"
  audio_bitrate: "192k"
  preset: "fast"
  use_nvenc: true
  face_samples: 9
  face_min_size: 72

diarization:
  enabled: false
  model: "pyannote/speaker-diarization"
