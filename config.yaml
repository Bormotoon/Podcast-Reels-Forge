# Podcast Reels Forge Configuration
#
# Default workflow:
# - Python 3.10+
# - Local llama.cpp only for the main analysis path
# - Gemma 4 lineup
# - FFmpeg + .ass subtitles for rendering

paths:
  input_dir: "input"
  output_dir: "output"

cli:
  quiet: false
  verbose: false

cache:
  enabled: true
  validate_json: true

transcription:
  model: "large-v3"
  device: "auto"          # auto | cuda | cpu
  language: "auto"        # auto | ru | en
  beam_size: 5
  compute_type: "auto"    # auto | float32 | float16 | int8 | int8_float16 | int8_float32
  best_of: 1
  patience: 1.0
  # Batched GPU inference: main speed lever. Transcription runs alone (llama.cpp starts
  # after), so all 16GB is free: 16 fits large-v3 in ~10-11GB. OOM auto-halves the batch.
  batch_size: 16
  # Anti-hallucination: stops the endless "Спасибо." loop on silence/music.
  condition_on_previous_text: false
  repetition_penalty: 1.1
  no_repeat_ngram_size: 3
  # fast = batched pipeline (~5 min/episode, no cross-segment context).
  # quality = sequential pipeline with context + hallucination guard: more accurate on
  # hard/quiet/far-field audio (fixes word-agreement errors), but ~10x slower (~1h/episode).
  mode: "fast"
  quality_beam_size: 10        # beam used only in quality mode
  # Optional domain context to bias vocabulary (helps both modes). Example:
  # initial_prompt: "Родительское собрание в школе. Программа, занятия, преподаватели."
  initial_prompt: ""

llama_cpp:
  url: "http://127.0.0.1:11440/completion"
  service:
    auto_start: true
    model_path: "/opt/llamacpp/models/gemma4-26b-IQ4_XS.gguf"
    startup_timeout: 120
    # RTX 5060 Ti 16GB: gemma4:26b (IQ4_XS, ~14GB) — weights are ~13GB on GPU.
    # 999 = full offload of all layers to the GPU. IQ4_XS fits in the 15.5GB of
    # free VRAM alongside the q8_0 KV cache, so full offload is the fast path.
    # n_gpu_layers=0 leaves the model on CPU (~6 tok/s) with this llama.cpp build.
    n_gpu_layers: 999
    ctx_size: 8192
    batch_size: 1024
    ubatch_size: 512
    threads: 4
    main_gpu: 0
    parallel: 1
    # Quantize the KV cache (needs flash-attn) to ~halve its VRAM; frees headroom on 16GB.
    cache_type_k: "q8_0"
    cache_type_v: "q8_0"
    extra_args: []
  scout_parallelism: 1
  roles:
    scout: "gemma4:26b"
    cleanup_refine: "gemma4:26b"
    judge_metadata: "gemma4:26b"
    proofread: "gemma4:26b"
    article: "gemma4:26b"
  timeout: 600
  temperature: 0.2
  chunk_seconds: 900
  # Russian text ~2-3 chars/token. 7000-char input chunk ≈ 2800-3500 tokens.
  max_chars_chunk: 7000
  # Max tokens for the JSON *response*. A rich scout answer (many moments with
  # Russian quotes/hooks/captions) easily exceeds 2000 tokens; too low a value
  # truncates the JSON mid-token and breaks parsing. Keep input + n_predict
  # under ctx_size (8192): ~3500 input + 4096 output ≈ 7600 < 8192.
  n_predict: 4096
  watchdog:
    enabled: true
    first_token_timeout: 90
    stall_timeout: 120
    log_interval: 10
    max_retries: 4
  fallback_models: []

  # Role-specific overrides. Keep the default flow local, predictable, and fast.
  role_overrides:
    scout:
      timeout: 600
      chunk_seconds: 1200
      temperature: 0.35
    cleanup_refine:
      timeout: 600
      temperature: 0.15
    judge_metadata:
      timeout: 600
      temperature: 0.05

  # Legacy compatibility only. Prefer role_overrides above.
  model_overrides: {}

prompts:
  language: "auto"        # auto | ru | en
  variant: "default"      # default | a | b

# Вычитка транскрипта: gemma4 исправляет орфографию и пунктуацию перед анализом.
# Guardrail сравнивает каждое исправление с оригиналом по буквенному составу и
# отклоняет правку, если модель дописала/удалила/пересказала текст. Результат
# пишется в <имя>.proofread.json (+ .srt); исходный транскрипт не меняется.
proofread:
  enabled: true
  # Максимум символов исходного текста в одном запросе. Вход и выход примерно
  # равны по размеру, поэтому бюджет держится с запасом внутри ctx_size=8192.
  max_chars_chunk: 4000
  temperature: 0.0
  timeout: 600
  # Порог схожести (0..1) нормализованного текста (без пунктуации/регистра).
  # Ниже порога исправление отклоняется и остаётся оригинал.
  min_similarity: 0.8

# Лонгрид: gemma4 приводит вычитанный транскрипт в вид читаемой статьи —
# разделы по смыслу с заголовками и абзацы. Это НЕ пересказ: слова, обороты и
# лицо автора сохраняются, убираются только слова-паразиты, оговорки и повторы.
# Три проверки ловят отклонения; нарушение — повтор запроса, а если и он не
# помог, фрагмент сохраняется, но помечается в <имя>.article.json.
# Результат: <имя>.article.md (+ .json). Транскрипт не изменяется.
article:
  enabled: true
  # Окно транскрипта на один запрос. Больше окно — крупнее и связнее разделы,
  # но выше риск упереться в ctx_size.
  chunk_seconds: 600
  max_chars_chunk: 6000
  temperature: 0.2
  timeout: 900
  # Пороги откалиброваны по эталонной ручной вычитке реального эпизода:
  # у неё 3% новых слов, сохранено 64% лексики источника, длина 42% (уходят
  # слова-паразиты). Пересказ своими словами того же эпизода дал 24% новых слов.
  #
  # Доля слов, которых нет в исходном фрагменте: выше — текст переписан, а не
  # отредактирован.
  max_novel_word_ratio: 0.15
  # Во сколько раз текст может быть длиннее источника (дописывание).
  max_length_ratio: 1.15
  # Ниже этой доли от источника текст уже не отредактирован, а сокращён.
  min_length_ratio: 0.25
  # Сколько лексики источника обязано уцелеть.
  min_source_coverage: 0.45

processing:
  # Тонкая настройка отбора моментов. Весь блок опционален: у каждого ключа
  # есть значение по умолчанию в коде, так что его можно удалить целиком.
  analysis:
    # Кандидатов на один запрос к cleanup (батч). Размер диктует не только
    # вход, но и выход: стадия возвращает выживших целиком, и 25 записей
    # переполняли n_predict=4096 внутри ctx_size=8192 (хвост JSON терялся).
    # Общий вход cleanup — max(cleanup_cap, целевое_число_клипов × 2),
    # обрабатывается несколькими запросами.
    cleanup_cap: 16
    # Сколько раз переспросить модель, если ответ не разобрался как JSON.
    json_retry: 1
    # Передавать llama.cpp полную схему ответа (она превращается в грамматику
    # сэмплирования). false — вернуться к разрешительной {"type": "object"},
    # если сборка llama.cpp не переваривает схему.
    strict_json_schema: true
    validation:
      # На сколько секунд кандидату можно выйти за границы своего куска.
      # Дальше — это выдуманный таймкод, и кандидат отбрасывается.
      chunk_tolerance_s: 3.0
      # Отбрасывать записи cleanup/judge, не пересекающиеся ни с одним
      # кандидатом на входе: эти стадии отбирают, а не придумывают.
      require_candidate_overlap: true
    quote_verification:
      # Сверять цитату с тем, что реально сказано на отрезке.
      enabled: true
      # Ниже этого сходства (0..1) цитата считается выдуманной и штрафуется.
      min_ratio: 0.55
      # Расширять границы клипа до найденной цитаты.
      refine_boundaries: true
    boundary_snap:
      # Подтягивать начало клипа к началу фразы, а конец — к концу мысли.
      enabled: true
      max_shift_s: 3.0
    judge_context:
      # Показывать judge реальные первые и последние секунды клипа.
      enabled: true
      # Кандидатов на один запрос к judge (батч). Списки длиннее судятся
      # несколькими запросами по порядку приоритета.
      max_candidates: 14
      head_seconds: 15
      tail_seconds: 5
      max_excerpt_chars: 260
    episode_context:
      # Один вызов LLM: обзор эпизода для scout-стадии. Кэшируется в
      # episode_context.json.
      enabled: true
      max_digest_chars: 4000
    audio_features:
      # Замер громкости и пауз на отрезке кандидата через ffmpeg.
      enabled: true
      timeout_s: 30
      silence_noise_db: -30.0
      silence_min_s: 0.35
    scoring:
      # Веса факторов приоритета. Пустой объект = значения по умолчанию.
      # Доступные ключи: base, hook, readability, completeness, speaker,
      # duration, mid_thought, quote, audio, speech_rate.
      weights: {}
    diversity:
      # Не брать в финал несколько клипов об одном и том же.
      enabled: true
      max_topic_similarity: 0.5

  quality_filters:
    # Оценка модели по шкале 1-10 (не приоритет ранжирования — он лежит
    # в отдельном поле priority).
    min_score: 7
    min_duration: 15
    max_duration: 180
    face_min_ratio: 0.3

  # Сколько клипов делать на час общего хронометража. Целевое количество
  # считается от суммарной длительности эпизода (1.5 часа × 10 = 15 клипов),
  # а счётчики в clips ниже задают только пропорции типов. 0 — выключить и
  # использовать фиксированные количества из clips как раньше.
  clips_per_hour: 10

  clips:
    stories:
      count: 2
      max_duration: 15
    reels:
      count: 3
      max_duration: 60
    long_reels:
      count: 1
      max_duration: 180
    highlights:
      count: 1
      moments_count: 5

  reels_count: 3
  reel_min_duration: 30
  reel_max_duration: 60
  reel_padding: 5

exports:
  webm: false
  gif: false
  audio_only: false

subtitles:
  enabled: true
  font: "assets/fonts/bignoodletoooblique.ttf"
  ass_style: "assets/subtitles/forge_subtitles.ass"
  # ~9% of the 1080px-wide frame — a readable viral-caption size. Matches the
  # style-editor default. The old 36 was ~3% of width → unreadably small.
  font_size_px: 96
  wrap_words: true
  max_lines: 2
  # Доля кадра под текст. Задаёт длину строки: базовые 25 символов/строку
  # (рекомендация BBC для 9:16) отмерены при 0.65, поэтому 0.74 → ~28.
  # 0.74 = 1080 - 2*140px полей, которые обходят правую панель кнопок.
  max_width_ratio: 0.74
  vertical_align: "bottom"
  # Сдвиг субтитров в долях высоты кадра поверх MarginV из .ass-стиля.
  # 0.0 = положение целиком задаёт редактор стиля.
  vertical_offset: 0.0
  # Плавное появление/исчезновение реплики (тег \fad). 0 — выключить.
  fade_in_duration: 0.12
  fade_out_duration: 0.08
  # Легаси: не влияют на рендер, положение и интервалы задаёт .ass-стиль
  # (MarginV / Spacing в редакторе). Оставлены только для старых конфигов.
  # word_x_space: 6
  # word_y_space: 8

video:
  threads: 4
  vertical_crop: true
  smart_crop_face: true
  video_bitrate: "8M"      # NVENC: peak ceiling for quality-driven VBR; software: target
  audio_bitrate: "192k"
  preset: "fast"           # libx264 preset (software fallback only)
  use_nvenc: true          # prefer GPU NVENC; auto-falls back to libx264 if unavailable
  nvenc_cq: 21             # NVENC VBR quality target, lower = better (18-24 sensible)
  nvenc_preset: "p5"       # NVENC preset p1(fastest)..p7(best); p5 is balanced
  face_samples: 9
  face_min_size: 72

diarization:
  enabled: false
  model: "pyannote/speaker-diarization"
  # Exact number of speakers, if known (curbs over-clustering on noise/overlap).
  # Leave empty/null to let pyannote estimate it automatically.
  num_speakers: null
