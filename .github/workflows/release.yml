name: Release

# CD half of the pipeline: pushing a vX.Y.Z tag publishes the matching GitHub
# Release. The notes come straight from CHANGELOG.md, so the tag, the package
# version and the changelog can never drift apart silently — the job fails if
# they do.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Check tag matches the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c "import re,pathlib; \
            print(re.search(r'__version__ = \"([^\"]+)\"', \
            pathlib.Path('podcast_reels_forge/__init__.py').read_text()).group(1))")"
          echo "tag=$tag package=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match __version__ $pkg"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          tag="${GITHUB_REF_NAME#v}"
          # Everything between this version's heading and the next one.
          awk -v ver="$tag" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for [$tag]"
            exit 1
          fi
          cat release-notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
