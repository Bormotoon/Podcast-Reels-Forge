<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Продвинутая студия субтитров ASS — Material 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* MATERIAL DESIGN 3 (DARK THEME) */
      --md-sys-color-background: #141218;
      --md-sys-color-on-background: #e6e0e9;
      
      --md-sys-color-surface: #141218;
      --md-sys-color-surface-container-low: #1d1b20;
      --md-sys-color-surface-container: #211f26;
      --md-sys-color-surface-container-high: #2b2930;
      --md-sys-color-surface-container-highest: #36343b;
      
      --md-sys-color-primary: #d0bcff;
      --md-sys-color-on-primary: #381e72;
      --md-sys-color-primary-container: #4f378b;
      --md-sys-color-on-primary-container: #eaddff;
      
      --md-sys-color-secondary: #ccc2dc;
      --md-sys-color-on-secondary: #332d41;
      --md-sys-color-secondary-container: #4a4458;
      --md-sys-color-on-secondary-container: #e8def8;
      
      --md-sys-color-outline: #938f99;
      --md-sys-color-outline-variant: #49454f;

      --md-elevation-1: 0px 1px 3px 1px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.30);
      --md-elevation-2: 0px 2px 6px 2px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.30);
      
      --ease-standard: cubic-bezier(0.2, 0, 0, 1);
      --ease-emphasized: cubic-bezier(0.2, 0, 0, 1);
      --ease-out: cubic-bezier(0, 0, 0, 1);
      
      --brand-color: #E1306C;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: 'Roboto', system-ui, sans-serif; 
      color: var(--md-sys-color-on-background);
      background-color: var(--md-sys-color-background);
      overflow-x: hidden;
    }

    .app {
      display: grid; grid-template-columns: minmax(0, 1.7fr) minmax(420px, 1fr);
      gap: 12px; padding: 12px; height: 100vh;
    }

    /* Collapse the bento to a single column before the panel gets too cramped */
    @media (max-width: 1100px) {
      .sidebar-body { grid-template-columns: 1fr; }
      .section.span-2 { grid-column: auto; }
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; grid-template-rows: auto 80vh; height: auto; }
      .sidebar { max-height: 60vh; }
    }

    /* M3 SIDEBAR */
    .sidebar {
      background: var(--md-sys-color-surface-container-low); 
      border-radius: 28px; 
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: var(--md-elevation-1);
    }

    .sidebar-header {
      padding: 16px 20px 12px;
      background: var(--md-sys-color-surface-container);
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
      z-index: 10;
    }
    h1 { margin: 0 0 2px; font-size: 18px; font-weight: 500; letter-spacing: 0px; color: var(--md-sys-color-on-background); }
    .lede { margin: 0; color: var(--md-sys-color-outline); font-size: 12.5px; font-weight: 400; letter-spacing: 0.25px;}

    /* M3 BENTO GRID — two columns with full-width bands */
    .sidebar-body {
      padding: 12px; overflow-y: auto;
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-flow: dense; align-content: start; gap: 10px;
    }
    .section.span-2 { grid-column: 1 / -1; }

    /* M3 CARDS (Sections) */
    .section {
      padding: 14px 16px; border-radius: 18px;
      background: var(--md-sys-color-surface-container);
      border: 1px solid transparent;
      transition: box-shadow 0.3s var(--ease-standard), transform 0.3s var(--ease-standard), border-color 0.3s;
      animation: slideUpFade 0.6s var(--ease-emphasized) backwards;
    }
    .section:hover { transform: translateY(-2px); box-shadow: var(--md-elevation-2); }
    
    /* Staggered Animations */
    .section:nth-child(1) { animation-delay: 0.05s; }
    .section:nth-child(2) { animation-delay: 0.10s; }
    .section:nth-child(3) { animation-delay: 0.15s; }
    .section:nth-child(4) { animation-delay: 0.20s; }
    .section:nth-child(5) { animation-delay: 0.25s; }
    .section:nth-child(6) { animation-delay: 0.30s; }

    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
      font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--md-sys-color-primary); margin: 0 0 10px 0; font-weight: 500;
      display: flex; align-items: center; gap: 6px;
    }
    .section-title svg { width: 16px; height: 16px; }

    /* M3 FILTER CHIPS (Presets) */
    .preset-group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .preset-btn {
      position: relative; overflow: hidden;
      font-size: 13px; font-weight: 500; padding: 0 12px; height: 28px; border-radius: 8px;
      background: transparent; border: 1px solid var(--md-sys-color-outline); 
      color: var(--md-sys-color-on-surface-variant); cursor: pointer;
      transition: all 0.2s var(--ease-standard);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .preset-btn::after {
      content: ''; position: absolute; inset: 0; background: currentColor; opacity: 0; transition: opacity 0.2s;
    }
    .preset-btn:hover::after { opacity: 0.08; }
    
    .preset-btn.active { 
      background: var(--md-sys-color-secondary-container); 
      border-color: transparent; 
      color: var(--md-sys-color-on-secondary-container); 
    }
    .preset-btn.plat-btn.active {
      background: var(--brand-color); color: #fff;
    }

    /* GRIDS & FIELDS */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .field { display: flex; flex-direction: column; gap: 5px; position: relative;}
    .field.full { grid-column: 1 / -1; }
    
    label { font-size: 12px; color: var(--md-sys-color-on-surface-variant); font-weight: 500; display: flex; justify-content: space-between; align-items: center;}
    .value { color: var(--md-sys-color-primary); background: var(--md-sys-color-surface-container-highest); padding: 2px 8px; border-radius: 12px; font-variant-numeric: tabular-nums; font-size: 11px;}
    
    /* M3 TEXT FIELDS & SELECTS */
    input[type="text"], textarea, select {
      width: 100%; border: 1px solid var(--md-sys-color-outline-variant); border-radius: 4px;
      background: transparent; color: var(--md-sys-color-on-background); padding: 9px 12px; font-size: 14px; outline: none;
      transition: all 0.2s var(--ease-standard); font-family: inherit;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: var(--md-sys-color-primary); border-width: 2px; padding: 8px 11px;
    }

    input[type="color"] { width: 100%; height: 34px; padding: 0; border: none; border-radius: 10px; cursor: pointer; background: transparent;}
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: 2px solid var(--md-sys-color-outline-variant); border-radius: 12px; transition: 0.2s; }
    input[type="color"]:hover::-webkit-color-swatch { border-color: var(--md-sys-color-primary); }

    /* M3 SLIDERS */
    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 30px; background: transparent; cursor: pointer; outline: none; margin: 0;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%; height: 8px; background: var(--md-sys-color-surface-container-highest); border-radius: 4px; transition: 0.2s;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: var(--md-sys-color-primary);
      margin-top: -6px; box-shadow: 0 0 0 0 rgba(208, 188, 255, 0); transition: 0.2s cubic-bezier(0.2, 0, 0, 1);
    }
    input[type="range"]:hover::-webkit-slider-thumb { box-shadow: 0 0 0 10px rgba(208, 188, 255, 0.12); transform: scale(1.1); }
    input[type="range"]:active::-webkit-slider-thumb { box-shadow: 0 0 0 14px rgba(208, 188, 255, 0.20); transform: scale(1.2); }

    /* M3 SWITCHES */
    .m3-switch {
      display: flex; align-items: center; justify-content: space-between; width: 100%; cursor: pointer;
      padding: 4px 0;
    }
    .m3-switch input { display: none; }
    .m3-switch-track {
      width: 52px; height: 32px; border-radius: 16px; border: 2px solid var(--md-sys-color-outline);
      background: var(--md-sys-color-surface-container-highest); position: relative; transition: 0.3s var(--ease-standard);
    }
    .m3-switch-thumb {
      width: 16px; height: 16px; border-radius: 50%; background: var(--md-sys-color-outline);
      position: absolute; top: 6px; left: 6px; transition: 0.3s var(--ease-standard);
    }
    .m3-switch:hover .m3-switch-thumb { box-shadow: 0 0 0 10px rgba(230, 224, 233, 0.08); }
    
    .m3-switch input:checked + .m3-switch-track { background: var(--md-sys-color-primary); border-color: var(--md-sys-color-primary); }
    .m3-switch input:checked + .m3-switch-track .m3-switch-thumb {
      background: var(--md-sys-color-on-primary); width: 24px; height: 24px; top: 2px; left: 24px;
    }
    .m3-switch input:checked:hover + .m3-switch-track .m3-switch-thumb { box-shadow: 0 0 0 10px rgba(56, 30, 114, 0.12); }

    /* M3 TOGGLE BUTTONS */
    .toggle-group { display: flex; border: 1px solid var(--md-sys-color-outline); border-radius: 18px; overflow: hidden; height: 34px;}
    .toggle-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer;
      border-right: 1px solid var(--md-sys-color-outline); background: transparent; transition: 0.2s;
    }
    .toggle-btn:last-child { border-right: none; }
    .toggle-btn input { display: none; }
    .toggle-content { font-size: 14px; font-weight: 500; color: var(--md-sys-color-on-surface-variant); z-index: 2; transition: 0.2s;}
    .toggle-bg { position: absolute; inset: 0; background: var(--md-sys-color-secondary-container); opacity: 0; transition: 0.2s; z-index: 1;}
    .toggle-btn input:checked ~ .toggle-bg { opacity: 1; }
    .toggle-btn input:checked ~ .toggle-content { color: var(--md-sys-color-on-secondary-container); }
    .toggle-btn:hover .toggle-bg { opacity: 0.08; }
    .toggle-btn input:checked:hover ~ .toggle-bg { opacity: 0.85; }

    /* M3 BUTTONS */
    button.action-btn {
      position: relative; overflow: hidden;
      border: none; border-radius: 18px; height: 36px; font-size: 13.5px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.1s, box-shadow 0.2s;
      background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container);
    }
    button.action-btn:active { transform: scale(0.96); }
    button.primary { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
    
    .file-upload-box {
      position: relative; overflow: hidden;
      border: 2px dashed var(--md-sys-color-outline); border-radius: 14px; padding: 11px; text-align: center; cursor: pointer;
      background: transparent; transition: 0.3s; margin-bottom: 10px;
      color: var(--md-sys-color-on-surface-variant);
    }
    .file-upload-box:hover { border-color: var(--md-sys-color-primary); background: rgba(208,188,255,0.05); color: var(--md-sys-color-primary); }
    .file-upload-box span { font-weight: 500; font-size: 13px; }

    .specs-info {
      font-size: 11.5px; color: var(--md-sys-color-on-surface-variant); background: var(--md-sys-color-surface-container-highest);
      padding: 9px 12px; border-radius: 10px; border-left: 4px solid var(--brand-color);
      line-height: 1.45; transition: border-color 0.5s; margin-bottom: 12px;
    }

    /* ========================================= */
    /* WORKSPACE & CANVAS ARCHITECTURE (PERFECT) */
    /* ========================================= */
    
    .workspace-body { 
      position: relative; padding: 20px; display: flex; justify-content: center; align-items: center; 
      height: 100%; border-radius: 28px; overflow: hidden; 
      background-color: var(--md-sys-color-background);
      background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 24px 24px;
      perspective: 1500px; /* Важно для 3D наклона */
    }

    /* AMBIENT GLOW BEHIND PHONE */
    .ambient-glow {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 400px; height: 800px; border-radius: 50%;
      background: var(--brand-color); opacity: 0.15; filter: blur(120px);
      transition: background 1s ease; pointer-events: none;
      animation: pulseGlow 6s infinite alternate;
    }
    @keyframes pulseGlow { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.15; } 100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.25; } }

    /* 1. Слой бронирования места (Scaling Wrapper) */
    .device-scaler {
      position: relative;
      /* Ширина и высота сюда пробрасываются через JS (например, 400x700px), чтобы работал Flex-centering */
    }

    /* 2. Слой парения (Float Wrapper) */
    .device-floater {
      position: absolute;
      top: 50%; left: 50%;
      /* Фиксированные оригинальные размеры телефона: 1080 + 34*2 + 6*2 = 1160px */
      width: 1160px; height: 2000px;
      margin-left: -580px; margin-top: -1000px; /* Четко центрируем внутри Scaler */
      animation: float 6s ease-in-out infinite;
      transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
      transform-style: preserve-3d;
      pointer-events: none; /* Пропускаем клики к фрейму */
    }
    .device-floater:hover {
      transform: scale(1.02); /* Эффект приближения при наведении */
      animation-play-state: paused;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-16px); }
    }

    /* 3. Слой фрейма смартфона (Apply Scale & Parallax Here) */
    .device-frame {
      position: absolute; top: 0; left: 0; box-sizing: content-box;
      background: #0f0f11; width: 1080px; height: 1920px; padding: 34px; 
      border-radius: 160px; border: 6px solid #2a2a2c;
      box-shadow: inset 0 0 12px rgba(255,255,255,0.05), 0 0 0 2px #000, 0 50px 100px -20px rgba(0,0,0,0.8);
      transform-origin: center center;
      transition: box-shadow 0.3s;
      pointer-events: auto; /* Включаем клики обратно */
    }

    /* Экран устройства (всегда ровно 1080x1920) */
    .preview-container {
      position: relative; width: 1080px; height: 1920px; overflow: hidden;
      border-radius: 126px; background: #000;
      /* APPLE-STYLE GRADIENT ONSCREEN */
      background-image: 
        radial-gradient(circle at 20% -10%, #3b1b6d 0%, transparent 45%),
        radial-gradient(circle at 80% 15%, #d82b6b 0%, transparent 40%),
        radial-gradient(circle at 50% 100%, #17428f 0%, transparent 55%),
        radial-gradient(circle at -10% 70%, #0d1e3d 0%, transparent 40%);
      box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
    }

    .device-camera {
      position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
      width: 300px; height: 90px; background: #000; border-radius: 45px; z-index: 50;
      box-shadow: inset -2px -2px 6px rgba(255,255,255,0.1), inset 2px 2px 6px rgba(0,0,0,1);
    }

    .device-btn { position: absolute; background: #2c2c2e; border: 1px solid #111; }
    .btn-power { right: -14px; top: 580px; width: 8px; height: 220px; border-radius: 0 8px 8px 0; }
    .btn-vol-up { left: -14px; top: 480px; width: 8px; height: 160px; border-radius: 8px 0 0 8px; }
    .btn-vol-down { left: -14px; top: 680px; width: 8px; height: 160px; border-radius: 8px 0 0 8px; }

    .media-layer { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; object-fit: cover; display: none; z-index: 1;}
    .placeholder-text { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
      color: rgba(255,255,255,0.95); text-align: center; font-weight: 500; line-height: 1.5; z-index: 2; pointer-events: none; width: 100%;
      text-shadow: 0 8px 24px rgba(0,0,0,0.8);
    }
    
    .ass-subtitle-container {
      position: absolute; display: flex; flex-direction: column; pointer-events: none; z-index: 10;
      left: var(--css-left); right: var(--css-right); top: var(--css-top); bottom: var(--css-bottom);
      align-items: var(--css-align-items); text-align: var(--css-text-align); transform: var(--css-transform-container);
    }
    .ass-line {
      display: inline-block; max-width: 100%;
      font-family: var(--css-font), sans-serif; font-size: var(--css-font-size);
      font-weight: var(--css-weight); font-style: var(--css-style);
      letter-spacing: var(--css-spacing);
      background-color: var(--css-box-bg); padding: var(--css-box-pad);
    }
    .ass-word {
      /* inline-block: transform (ScaleX/ScaleY/Angle) не действует на строчные элементы */
      display: inline-block;
      font: inherit; text-decoration: var(--css-decoration);
      color: var(--css-color-sec); text-shadow: var(--css-text-shadow); -webkit-text-stroke: var(--css-text-stroke);
      /* Рисуем обводку ПОЗАДИ заливки — как это делает libass (контур снаружи глифа),
         иначе толстый stroke «съедает» буквы и текст превращается в чёрное месиво. */
      paint-order: stroke fill;
      transform: var(--css-transform-word); white-space: nowrap; line-height: 1.1; transition: color 0.1s;
    }
    .ass-word.active { color: var(--css-color-pri); }

    .overlay-layer { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; pointer-events: none; z-index: 20; }
    .overlay-layer polygon { transition: all 0.5s var(--ease-standard); }
    
    .code-card { padding: 12px; border-radius: 16px; background: var(--md-sys-color-surface-container-highest); border: 1px solid var(--md-sys-color-outline-variant); margin-top: 10px;}
    textarea.code { font-family: var(--font-code); font-size: 11px; min-height: 120px; background: transparent; color: var(--md-sys-color-secondary); border: none; padding: 0;}
    textarea.code:focus { border:none; padding:0; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel sidebar">
      <div class="sidebar-header">
        <h1>Студия ASS</h1>
        <p class="lede">Material 3.0 • Безопасные зоны и субтитры</p>
      </div>

      <div class="sidebar-body">
        
        <section class="section">
          <div class="section-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg> Настройка платформы</div>
          
          <div class="preset-group">
            <button class="preset-btn plat-btn active ripplable" data-platform="ig">IG Reels</button>
            <button class="preset-btn plat-btn ripplable" data-platform="tiktok">TikTok</button>
            <button class="preset-btn plat-btn ripplable" data-platform="yt">YT Shorts</button>
          </div>

          <div class="specs-info" id="specs-text">
            <strong>IG Reels:</strong> Безопасная зона. Отступы: Верх 220px, Низ 420px, Справа 140px.
          </div>

          <label class="file-upload-box ripplable">
            <input type="file" id="media-upload" accept="image/*,video/*">
            <span>Загрузить фон (фото/видео)</span>
          </label>
          <button class="action-btn full ripplable" id="clearMediaBtn" style="margin-bottom:16px;">Очистить медиа</button>

          <label class="m3-switch ripplable-switch">
            <span style="font-weight: 500; font-size:14px; color:var(--md-sys-color-on-background)">Интерфейс-макет</span>
            <input type="checkbox" id="showUI" checked>
            <div class="m3-switch-track"><div class="m3-switch-thumb"></div></div>
          </label>
          
          <label class="m3-switch ripplable-switch">
            <span style="font-weight: 500; font-size:14px; color:var(--md-sys-color-on-background)">Контур безопасной зоны</span>
            <input type="checkbox" id="showOutline" checked>
            <div class="m3-switch-track"><div class="m3-switch-thumb"></div></div>
          </label>

          <label class="m3-switch ripplable-switch">
            <span style="font-weight: 500; font-size:14px; color:var(--md-sys-color-on-background)">Тёмная маска (небезопасная область)</span>
            <input type="checkbox" id="showMask" checked>
            <div class="m3-switch-track"><div class="m3-switch-thumb"></div></div>
          </label>

          <div class="field full" style="margin-top:8px;">
            <label>Прозрачность маски <span class="value" id="v-maskOpacity"></span></label>
            <input id="maskOpacity" type="range" min="0" max="100" step="1">
          </div>
        </section>

        <!-- Typography -->
        <section class="section span-2">
          <div class="section-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg> Типографика</div>
          <div class="preset-group">
            <button class="preset-btn ripplable" onclick="applyPreset('typo', 'hormozi')">Hormozi</button>

                    <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm-8 8c0-1.01.25-1.97.7-2.8L3.24 7.74C2.46 8.97 2 10.43 2 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3c-3.31 0-6-2.69-6-6z"></path>
                </g>
                <text x="995" y="1325" font-size="22" class="svg-t" text-anchor="middle">Ремикс</text>
                <rect x="950" y="1380" width="90" height="90" rx="15" fill="#333" stroke="white" stroke-width="4" class="svg-i"/>
                <circle cx="85" cy="1590" r="45" fill="#555" stroke="rgba(255,255,255,0.4)" stroke-width="2" class="svg-i" />
                <text x="145" y="1605" font-size="40" class="svg-t">@НазваниеКанала</text>
                <rect x="470" y="1565" width="260" height="60" rx="30" fill="white" class="svg-i"/>
                <text x="600" y="1605" font-size="30" fill="black" font-weight="bold" font-family="'Roboto', sans-serif" text-anchor="middle">Подписаться</text>
                <text x="40" y="1690" font-size="40" class="svg-t">Это цепляющий заголовок YouTube Shorts...</text>
            `
        }
    };

    const DEFAULTS = {
      fontPath: "assets/fonts/bignoodletoooblique.ttf",
      fontSizePx: 96, spacingPx: 0, bold: true, italic: false, underline: false, strikeout: false,
      // \kf заливает слово от вторичного цвета к основному: белое — ещё не
      // произнесено, янтарное — уже прозвучало. Толстый контур вместо тени —
      // именно он держит читаемость поверх любого видео.
      primaryColor: "#FFD60A", primaryOp: 1.0, secondaryColor: "#FFFFFF", secondaryOp: 1.0,
      borderStyle: 1, outlineColor: "#000000", outlineOp: 1.0, outline: 8,
      backColor: "#000000", backOp: 0.5, shadow: 0,
      // Поля 140px обходят правую панель кнопок Reels/TikTok/Shorts,
      // MarginV 470 поднимает текст над подписью и строкой со звуком.
      alignment: 2, marginV: 470, marginL: 140, marginR: 140,
      scaleX: 100, scaleY: 100, angle: 0,
      sampleText: "Разбираемся, почему этот выпуск вызывает споры.", autoAnimate: true,
      platform: "ig", showUI: true, showMask: true, showOutline: true, maskOpacity: 60
    };

    // Пресеты, вдохновлённые самыми вирусными форматами роликов
    const PRESETS = {
      typo: {
        // Alex Hormozi: огромный жирный текст, слегка вытянутый по вертикали
        hormozi: { fontSizePx: 72, spacingPx: -1, bold: true, italic: false, scaleX: 100, scaleY: 108, angle: 0 },
        // MrBeast: максимально крупный, энергичный
        mrbeast: { fontSizePx: 84, spacingPx: 0, bold: true, italic: false, scaleX: 105, scaleY: 100, angle: 0 },
        // TikTok auto-caption / караоке
        tiktok: { fontSizePx: 60, spacingPx: 1, bold: true, italic: false, scaleX: 100, scaleY: 100, angle: 0 },
        // Минималистичный «Apple-style» тонкий шрифт
        minimal: { fontSizePx: 44, spacingPx: 3, bold: false, italic: false, scaleX: 100, scaleY: 100, angle: 0 },
        // Динамичный курсив с наклоном
        impact: { fontSizePx: 58, spacingPx: 0, bold: true, italic: true, scaleX: 100, scaleY: 100, angle: 4 }
      },
      colors: {
        hormozi: { primaryColor: "#FFD60A", secondaryColor: "#FFFFFF", primaryOp: 1.0, secondaryOp: 1.0 },
        green: { primaryColor: "#39FF14", secondaryColor: "#FFFFFF", primaryOp: 1.0, secondaryOp: 1.0 },
        tiktok: { primaryColor: "#00F2EA", secondaryColor: "#FFFFFF", primaryOp: 1.0, secondaryOp: 1.0 },
        red: { primaryColor: "#FF2D2D", secondaryColor: "#FFFFFF", primaryOp: 1.0, secondaryOp: 1.0 },
        white: { primaryColor: "#FFFFFF", secondaryColor: "#FFFFFF", primaryOp: 1.0, secondaryOp: 1.0 }
      },
      borders: {
        // Hormozi: толстый чёрный контур без тени
        hormozi: { borderStyle: 1, outline: 9, outlineColor: "#000000", outlineOp: 1.0, shadow: 0, backColor: "#000000", backOp: 0.8 },
        // Мягкая drop-shadow
        shadow: { borderStyle: 1, outline: 3, outlineColor: "#000000", outlineOp: 1.0, shadow: 7, backColor: "#000000", backOp: 0.75 },
        // Непрозрачная плашка (как авто-субтитры TikTok/YouTube)
        box: { borderStyle: 3, outline: 0, outlineColor: "#000000", outlineOp: 0.0, backColor: "#000000", backOp: 0.9, shadow: 0 },
        // Плашка + белый контур
        box_outline: { borderStyle: 3, outline: 2, outlineColor: "#FFFFFF", outlineOp: 1.0, backColor: "#000000", backOp: 0.85, shadow: 0 },
        // Неоновое свечение
        neon: { borderStyle: 1, outline: 4, outlineColor: "#000000", outlineOp: 1.0, shadow: 10, backColor: "#00F2EA", backOp: 0.9 }
      },
      geometry: {
        reels: { alignment: 2, marginV: 470 },
        shorts: { alignment: 2, marginV: 360 },
        center: { alignment: 5, marginV: 0 },
        top: { alignment: 8, marginV: 250 },
        tiktok: { alignment: 2, marginV: 560 }
      }
    };

    const state = { ...DEFAULTS, ...JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}") };
    let projHandle = null, activeIdx = 0, objectUrl = null;

    // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ДЛЯ АНИМАЦИИ ---
    let currentScale = 0.35;
    let rotX = 0;
    let rotY = 0;

    // ЕДИНАЯ функция применения трансформаций (убирает конфликты!)
    function applyTransforms() {
        const frame = document.getElementById('deviceFrame');
        if(!frame) return;
        frame.style.transform = `scale(${currentScale}) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    }

    // --- PARALLAX 3D HOVER EFFECT ON PHONE ---
    const workspace = document.getElementById('workspaceBody');
    workspace.addEventListener('mousemove', (e) => {
      const rect = workspace.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      
      // Вычисляем угол наклона (макс 6 градусов)
      rotX = ((y - centerY) / centerY) * -6; 
      rotY = ((x - centerX) / centerX) * 6;
      
      applyTransforms();
    });
    
    workspace.addEventListener('mouseleave', () => {
      rotX = 0; rotY = 0;
      applyTransforms();
    });

    // ТОЧНОЕ МАТЕМАТИЧЕСКОЕ МАСШТАБИРОВАНИЕ (Без багов)
    function resizePreview() {
      const body = document.getElementById('workspaceBody');
      const scaler = document.getElementById('deviceScaler');
      
      // Жестко зашитые физические размеры оболочки:
      // Экран 1080x1920 + Padding(34*2) + Borders(6*2)
      const frameW = 1160; 
      const frameH = 2000; 
      
      const rect = body.getBoundingClientRect();
      const maxW = rect.width - 40;
      const maxH = rect.height - 40;
      
      let scale = Math.min(maxW / frameW, maxH / frameH);
      if (scale <= 0 || isNaN(scale)) scale = 0.35;
      
      // Передаем размеры в резервный контейнер для Flex-центровки
      scaler.style.width = `${frameW * scale}px`;
      scaler.style.height = `${frameH * scale}px`;
      
      // Сохраняем глобальный масштаб и применяем
      currentScale = scale;
      applyTransforms();
    }

    window.applyPreset = function(category, name) {
      if(PRESETS[category] && PRESETS[category][name]) {
        Object.assign(state, PRESETS[category][name]);
        sync();
      }
    };

    function toASSColor(hex, opacity) {
      hex = hex.replace('#', '');
      if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
      let r = hex.substring(0,2).toUpperCase();
      let g = hex.substring(2,4).toUpperCase();
      let b = hex.substring(4,6).toUpperCase();
      let a = Math.round((1 - opacity) * 255).toString(16).padStart(2, '0').toUpperCase();
      return `&H${a}${b}${g}${r}`;
    }

    function toRGBA(hex, op) {
      hex = hex.replace('#', '');
      if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
      return `rgba(${parseInt(hex.substring(0,2),16)}, ${parseInt(hex.substring(2,4),16)}, ${parseInt(hex.substring(4,6),16)}, ${op})`;
    }

    // Список src: этот редактор живёт и в assets/subtitles/, и встроен в gui/,
    // поэтому даём оба относительных пути — @font-face берёт первый рабочий.
    function repoRootPrefix() {
      const dir = new URL('.', document.baseURI).pathname;
      if (/\/gui\/$/.test(dir)) return '../';
      if (/\/assets\/subtitles\/$/.test(dir)) return '../../';
      return '';
    }

    function fontFaceSrc(rawPath) {
      const path = String(rawPath || '').trim();
      if (!path) return '';
      const esc = path.replace(/"/g, '\\"');
      if (/^(https?:|data:|file:|\/)/i.test(path)) return `url("${esc}")`;
      // Сначала известная глубина (обычный случай — без лишнего 404),
      // остальное — страховка, если файлы переедут.
      const prefixes = [repoRootPrefix(), '../', '../../', ''];
      const seen = new Set();
      return prefixes
        .filter(p => !seen.has(p) && seen.add(p))
        .map(p => `url("${p}${esc}")`)
        .join(', ');
    }

    let lastFontSrc = null;
    function applyFontFace() {
      const src = fontFaceSrc(state.fontPath);
      if (src === lastFontSrc) return;   // не перезапускаем загрузку шрифта зря
      lastFontSrc = src;
      const styleEl = document.getElementById('dynamic-font-face');
      if (styleEl) {
        styleEl.textContent = src
          ? `@font-face { font-family: 'AssPreview'; src: ${src}; font-display: swap; }`
          : '';
      }
    }

    // Перекраска караоке без перестройки DOM (тик идёт каждые 400мс).
    function paintKaraoke() {
      const words = document.querySelectorAll('#subContainer .ass-word');
      // Стоп-кадр = середина \kf-свипа: видны обе заливки, обе настраиваются.
      const cut = state.autoAnimate ? activeIdx : Math.ceil(words.length * 0.6);
      words.forEach((span, i) => span.classList.toggle('active', i < cut));
    }

    function updatePreview() {
      const c = document.getElementById('subContainer');

      applyFontFace();

      c.style.setProperty('--css-font', "'AssPreview'");
      c.style.setProperty('--css-font-size', `${state.fontSizePx}px`);
      c.style.setProperty('--css-spacing', `${state.spacingPx}px`);
      c.style.setProperty('--css-weight', state.bold ? 'bold' : 'normal');
      c.style.setProperty('--css-style', state.italic ? 'italic' : 'normal');
      
      let decor = [];
      if (state.underline) decor.push('underline');
      if (state.strikeout) decor.push('line-through');
      c.style.setProperty('--css-decoration', decor.join(' ') || 'none');

      c.style.setProperty('--css-color-pri', toRGBA(state.primaryColor, state.primaryOp));
      c.style.setProperty('--css-color-sec', toRGBA(state.secondaryColor, state.secondaryOp));

      let align = parseInt(state.alignment);
      let mV = state.marginV + "px", mL = state.marginL + "px", mR = state.marginR + "px";
      
      c.style.setProperty('--css-top', 'auto'); c.style.setProperty('--css-bottom', 'auto');
      c.style.setProperty('--css-left', 'auto'); c.style.setProperty('--css-right', 'auto');
      c.style.setProperty('--css-transform-container', 'none');

      if ([7,8,9].includes(align)) { c.style.setProperty('--css-top', mV); }
      else if ([4,5,6].includes(align)) { c.style.setProperty('--css-top', '50%'); c.style.setProperty('--css-transform-container', 'translateY(-50%)'); }
      else { c.style.setProperty('--css-bottom', mV); }

      if ([1,4,7].includes(align)) { 
        c.style.setProperty('--css-left', mL); c.style.setProperty('--css-align-items', 'flex-start'); c.style.setProperty('--css-text-align', 'left'); c.style.setProperty('--css-justify', 'flex-start');
      } else if ([3,6,9].includes(align)) { 
        c.style.setProperty('--css-right', mR); c.style.setProperty('--css-align-items', 'flex-end'); c.style.setProperty('--css-text-align', 'right'); c.style.setProperty('--css-justify', 'flex-end');
      } else { 
        c.style.setProperty('--css-left', mL); c.style.setProperty('--css-right', mR); c.style.setProperty('--css-align-items', 'center'); c.style.setProperty('--css-text-align', 'center'); c.style.setProperty('--css-justify', 'center');
      }

      c.style.setProperty('--css-transform-word', `scale(${state.scaleX/100}, ${state.scaleY/100}) rotate(${-state.angle}deg)`);

      let oC = toRGBA(state.outlineColor, state.outlineOp);
      let bC = toRGBA(state.backColor, state.backOp);
      let oPx = state.outline;
      let sPx = state.shadow;

      c.style.setProperty('--css-box-bg', 'transparent'); c.style.setProperty('--css-box-pad', '0');
      c.style.setProperty('--css-text-stroke', '0'); c.style.setProperty('--css-text-shadow', 'none');

      if (state.borderStyle == 1) { 
        let shadows = [];
        if (oPx > 0) c.style.setProperty('--css-text-stroke', `${oPx*2}px ${oC}`);
        if (sPx > 0) shadows.push(`${sPx}px ${sPx}px 0 ${bC}`);
        c.style.setProperty('--css-text-shadow', shadows.join(', ') || 'none');
      } else { 
        c.style.setProperty('--css-box-bg', bC);
        c.style.setProperty('--css-box-pad', `25px 40px`);
        if (oPx > 0) c.style.setProperty('--css-text-stroke', `${oPx*2}px ${oC}`);
      }

      let words = state.sampleText.trim().split(/\s+/).filter(Boolean);
      c.innerHTML = '';
      let lineDiv = document.createElement('div');
      lineDiv.className = 'ass-line';
      words.forEach((w, i) => {
        // Настоящий пробел между словами — как в прожиге (" ".join).
        if (i > 0) lineDiv.appendChild(document.createTextNode(' '));
        let span = document.createElement('span'); span.className = 'ass-word';
        span.textContent = w; lineDiv.appendChild(span);
      });
      c.appendChild(lineDiv);
      paintKaraoke();

      const platData = PLATFORMS[state.platform] || PLATFORMS.ig;
      document.documentElement.style.setProperty('--brand-color', platData.color);
      document.getElementById('ambientGlow').style.background = platData.color;
      document.getElementById('specs-text').innerHTML = platData.desc;
      
      const uiLayer = document.getElementById('uiLayer');
      uiLayer.innerHTML = state.showUI ? platData.ui : '';
      
      document.getElementById('mask-polygon').setAttribute('points', platData.points);
      document.getElementById('safe-outline').setAttribute('points', platData.points);
      
      document.getElementById('darkness-rect').setAttribute('opacity', state.showMask ? state.maskOpacity / 100 : '0');
      document.getElementById('safe-outline').style.opacity = state.showOutline ? '1' : '0';
      
      document.querySelectorAll('.plat-btn').forEach(b => b.classList.remove('active'));
      const activePlatBtn = document.querySelector(`.plat-btn[data-platform="${state.platform}"]`);
      if (activePlatBtn) activePlatBtn.classList.add('active');
      
      resizePreview();
    }

    function getASS() {
      let fname = state.fontPath.split('/').pop().replace(/\.[^/.]+$/, "");
      let style = `Style: Default,${fname},${state.fontSizePx},` +
                  `${toASSColor(state.primaryColor, state.primaryOp)},` +
                  `${toASSColor(state.secondaryColor, state.secondaryOp)},` +
                  `${toASSColor(state.outlineColor, state.outlineOp)},` +
                  `${toASSColor(state.backColor, state.backOp)},` +
                  `${state.bold?-1:0},${state.italic?-1:0},${state.underline?-1:0},${state.strikeout?-1:0},` +
                  `${state.scaleX},${state.scaleY},${state.spacingPx},${state.angle},` +
                  `${state.borderStyle},${state.outline},${state.shadow},${state.alignment},` +
                  `${state.marginL},${state.marginR},${state.marginV},1`;
      return `[Script Info]\nScriptType: v4.00+\nPlayResX: 1080\nPlayResY: 1920\n\n[V4+ Styles]\nFormat: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\n${style}`;
    }

    function sync() {
      Object.keys(DEFAULTS).forEach(id => {
        let el = document.getElementById(id);
        if(!el) return;
        
        if(el.type === 'checkbox') el.checked = state[id];
        else el.value = state[id];
        
        let valEl = document.getElementById('v-'+id);
        if(valEl) valEl.innerText = state[id];
      });
      
      updatePreview();
      document.getElementById('assOutput').value = getASS();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    Object.keys(DEFAULTS).forEach(id => {
      let el = document.getElementById(id);
      if(!el) return;
      el.addEventListener('input', e => {
        if(el.type === 'checkbox') state[id] = e.target.checked;
        else if(el.type === 'range' || el.type === 'number') state[id] = parseFloat(e.target.value);
        else state[id] = e.target.value;
        sync();
      });
    });

    document.querySelectorAll('.plat-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        state.platform = e.currentTarget.getAttribute('data-platform');
        sync();
      });
    });

    const fileInput = document.getElementById('media-upload');
    const imgPreview = document.getElementById('preview-img');
    const vidPreview = document.getElementById('preview-vid');
    const placeholder = document.getElementById('placeholder');
    
    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      if (objectUrl) URL.revokeObjectURL(objectUrl);
      objectUrl = URL.createObjectURL(file);
      placeholder.style.display = 'none';

      if (file.type.startsWith('video/')) {
          imgPreview.style.display = 'none';
          vidPreview.src = objectUrl; vidPreview.style.display = 'block';
      } else if (file.type.startsWith('image/')) {
          vidPreview.style.display = 'none'; vidPreview.pause();
          imgPreview.src = objectUrl; imgPreview.style.display = 'block';
      }
    });

    document.getElementById('clearMediaBtn').addEventListener('click', function() {
      fileInput.value = '';
      imgPreview.style.display = 'none'; vidPreview.style.display = 'none'; vidPreview.pause();
      placeholder.style.display = 'block';
      if (objectUrl) { URL.revokeObjectURL(objectUrl); objectUrl = null; }
    });

    window.addEventListener('resize', resizePreview);
    
    setInterval(() => {
      if(state.autoAnimate) {
        let max = state.sampleText.trim().split(/\s+/).filter(Boolean).length;
        activeIdx = (activeIdx + 1) % (max + 1);
        paintKaraoke();
      }
    }, 400);

    document.getElementById('connectBtn').addEventListener('click', async () => {
      try {
        projHandle = await window.showDirectoryPicker({ mode: "readwrite" });
        document.getElementById('connectBtn').innerText = projHandle.name + " \u2714";
      } catch(e) { alert(e); }
    });

    document.getElementById('applyBtn').addEventListener('click', async () => {
      if (!projHandle) return alert("Сначала выберите папку проекта!");
      try {
        let dir = projHandle;
        for (let p of ["assets", "subtitles"]) dir = await dir.getDirectoryHandle(p, { create: true });
        let file = await dir.getFileHandle("forge_subtitles.ass", { create: true });
        let writable = await file.createWritable();
        await writable.write(getASS());
        await writable.close();
        
        let btn = document.getElementById('applyBtn');
        btn.innerText = "\u0421\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u043e! \u2714";
        btn.style.background = "var(--md-sys-color-primary-container)"; 
        btn.style.color = "var(--md-sys-color-on-primary-container)";
        setTimeout(() => { 
            btn.innerText = "Сохранить файл ASS";
            btn.style.background = "var(--md-sys-color-primary)"; 
            btn.style.color = "var(--md-sys-color-on-primary)";
        }, 2000);
      } catch(e) { alert("Ошибка: " + e); }
    });

    // Initial sync and calculation
    setTimeout(() => { sync(); resizePreview(); }, 100);
  </script>
</body>
